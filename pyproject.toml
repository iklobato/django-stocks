[tool.uv]
# Python dependency groups

[tool.uv.dependencies]
# Core dependencies for both services
django = "==3.1.7"
asgiref = "==3.3.1"
djangorestframework = "==3.12.4"
pytz = "==2021.1"
sqlparse = "==0.4.1"
certifi = "==2020.12.5"
chardet = "==4.0.0"
idna = "==2.10"
requests = "==2.25.1"
urllib3 = "==1.26.4"
setuptools = "*"  # Required for distutils compatibility

[tool.uv.dev-dependencies]
pytest = ">=7.0.0"
pytest-django = ">=4.5.2"
black = ">=23.0.0"
isort = ">=5.12.0"
flake8 = ">=6.0.0"

# Define groups for specific services
[tool.uv.group.api]
dependencies = [
    "django==3.1.7",
    "asgiref==3.3.1",
    "djangorestframework==3.12.4",
    "pytz==2021.1",
    "sqlparse==0.4.1",
    "certifi==2020.12.5",
    "chardet==4.0.0",
    "idna==2.10",
    "requests==2.25.1",
    "urllib3==1.26.4",
    "setuptools",
]

[tool.uv.group.stock]
dependencies = [
    "django==3.1.7",
    "asgiref==3.3.1",
    "djangorestframework==3.12.4",
    "pytz==2021.1",
    "sqlparse==0.4.1",
    "certifi==2020.12.5",
    "chardet==4.0.0",
    "idna==2.10",
    "requests==2.25.1",
    "urllib3==1.26.4",
    "setuptools",
]

[tool.black]
line-length = 88
target-version = ['py38']
include = '\.pyi?$'

[tool.isort]
profile = "black"
line_length = 88