version: '3.8'

services:
  # RabbitMQ message broker
  rabbitmq:
    image: rabbitmq:3-management
    container_name: stock-rabbitmq
    ports:
      - "5672:5672"   # AMQP protocol port
      - "15672:15672" # Management UI port
    env_file:
      - .env
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stock-network

  # Stock Service (RabbitMQ Consumer)
  stock-service:
    build:
      context: .
      dockerfile: ./stock_service/Dockerfile
    container_name: stock-service
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DEBUG=${DEBUG}
      - SECRET_KEY=${SECRET_KEY}
      - RABBITMQ_HOST=${RABBITMQ_HOST}
      - RABBITMQ_PORT=${RABBITMQ_PORT}
      - RABBITMQ_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_PASSWORD=${RABBITMQ_DEFAULT_PASS}
      - RABBITMQ_STOCK_QUEUE=${RABBITMQ_STOCK_QUEUE}
      - ALLOWED_HOSTS=localhost,127.0.0.1,stock-service
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/stock?symbol=AAPL.US"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    command: >
      bash -c "python manage.py migrate &&
              gunicorn stock_service.wsgi:application --bind 0.0.0.0:8001 --workers 2"
    volumes:
      - ./stock_service:/app
    networks:
      - stock-network

  # API Service (RabbitMQ Producer)
  api-service:
    build:
      context: .
      dockerfile: ./api_service/Dockerfile
    container_name: api-service
    restart: unless-stopped
    depends_on:
      stock-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - RABBITMQ_HOST=${RABBITMQ_HOST}
      - RABBITMQ_PORT=${RABBITMQ_PORT}
      - RABBITMQ_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_PASSWORD=${RABBITMQ_DEFAULT_PASS}
      - RABBITMQ_STOCK_QUEUE=${RABBITMQ_STOCK_QUEUE}
      - RABBITMQ_TIMEOUT=${RABBITMQ_TIMEOUT}
      - STOCK_SERVICE_URL=${STOCK_SERVICE_URL}
      - DEBUG=${DEBUG}
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=localhost,127.0.0.1,api-service
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    command: >
      bash -c "python manage.py migrate &&
              python manage.py shell -c \"from django.contrib.auth.models import User; User.objects.filter(username='${ADMIN_USERNAME}').exists() or User.objects.create_superuser('${ADMIN_USERNAME}', '${ADMIN_EMAIL}', '${ADMIN_PASSWORD}')\" &&
              gunicorn api_service.wsgi:application --bind 0.0.0.0:8000 --workers 2"
    volumes:
      - ./api_service:/app
    networks:
      - stock-network

networks:
  stock-network:
    driver: bridge

volumes:
  rabbitmq_data: